name: Bug triage

on:
  issues:
    types: [opened, labeled]

permissions:
  issues: write

jobs:
  acknowledge-bug:
    name: Acknowledge bug report
    if: contains(github.event.issue.labels.*.name, 'bug')
    runs-on: ubuntu-latest
    steps:
      - name: Add triage response
        uses: actions/github-script@v7
        with:
          script: |
            const body = [
              'Obrigado pelo relato! A issue foi registrada para triagem.',
              '',
              'Para agilizar a investigação, inclua se possível:',
              '- passos para reproduzir;',
              '- comportamento esperado e observado;',
              '- navegador/dispositivo e capturas de tela ou logs relevantes.',
            ].join('\\n');
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const alreadyAcknowledged = comments.some((comment) =>
              comment.user.type === 'Bot' && comment.body.includes('issue foi registrada para triagem'),
            );
            if (!alreadyAcknowledged) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
